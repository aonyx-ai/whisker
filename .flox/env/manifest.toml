schema-version = "1.10.0"

[install]
# Rustup installs rustc, cargo, clippy, rust-analyzer, and rustfmt
rustup.pkg-path = "rustup"

# The standard library links against this package on macOS.
libiconv.pkg-path = "libiconv"
libiconv.systems = ["aarch64-darwin", "x86_64-darwin"]
libiconv.outputs = "all"

# We install gcc and clang as linkers for Rust.
clang.pkg-path = "clang"
clang.systems = ["aarch64-darwin", "x86_64-darwin"]
gcc.pkg-path = "gcc"
gcc.systems = ["aarch64-linux", "x86_64-linux"]
gcc.outputs = "all"

# Local development tools
cargo-deny.pkg-path = "cargo-deny"
cargo-nextest.pkg-path = "cargo-nextest"
git.pkg-path = "git"
git.outputs = "all"
just.pkg-path = "just"
just.outputs = "all"
markdownlint-cli.pkg-path = "markdownlint-cli"
parallel.pkg-path = "parallel"
parallel.outputs = "all"
pre-commit.pkg-path = "pre-commit"
pre-commit.outputs = "all"
prettier.pkg-path = "prettier"
taplo.pkg-path = "taplo"
yamllint.pkg-path = "yamllint"
yamllint.outputs = "all"
zizmor.pkg-path = "zizmor"
openssl.pkg-path = "openssl"
openssl.outputs = "all"
pkg-config.pkg-path = "pkg-config"
zlib.pkg-path = "zlib"
zlib.outputs = "all"

[vars]

[hook]
on-activate = '''
# On GitHub Actions, we need to unset the LD_AUDIT variable to avoid an "cannot
# allocate memory in static TLS block" error when loading Rust. See this issue:
# https://github.com/flox/flox/issues/1341
if [ -n "$GITHUB_ACTIONS" ]; then
  unset LD_AUDIT
fi

# Install the nightly toolchain and components specified in rust-toolchain.toml.
# Rustup handles this idempotently — it's a no-op if already installed.
rustup show > /dev/null 2>&1

# Install dylint tools needed for building and testing lint libraries.
cargo install --quiet cargo-dylint dylint-link 2> /dev/null
'''

[profile]

[services]

[include]

[build]

[options]
